        <text x="16" y="55">SHIFT-014823</text>
        <text x="120" y="55">A. Janssen</text>
        <text x="320" y="55">Bol.com Waalwijk</text>
        <text x="540" y="55">2026-04-29 08:00</text>
        <text x="700" y="55">14:00</text>
        <text x="860" y="55">€14.50/h</text>
        <text x="980" y="55" fill="#999">CLAIMED</text>
