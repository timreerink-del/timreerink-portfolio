<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Mockup of the new consumer-grade DMP app — three phone screens with the worker as protagonist">
  <defs>
    <linearGradient id="bgAfter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1f3a"/>
      <stop offset="0.6" stop-color="#0c0c0e"/>
      <stop offset="1" stop-color="#0c0c0e"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b78ff"/>
      <stop offset="1" stop-color="#3a52cc"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#f4f1ec"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bgAfter)"/>

  <!-- Phone 1 (left, tilted) — Home / good morning -->
  <g transform="translate(200,200) rotate(-6)">
    <rect width="260" height="540" rx="34" fill="#0c0c0e" stroke="#26262c" stroke-width="2"/>
    <rect x="10" y="10" width="240" height="520" rx="26" fill="#fafaf7"/>
    <rect x="100" y="14" width="60" height="20" rx="10" fill="#0c0c0e"/>
    <!-- Greeting -->
    <text x="24" y="78" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#0c0c0e">Good morning,</text>
    <text x="24" y="106" font-family="Georgia, serif" font-size="26" font-style="italic" font-weight="300" fill="#5b78ff">Tim.</text>
    <text x="24" y="130" font-family="ui-monospace, monospace" font-size="9" fill="#8a8a93" letter-spacing="1">3 SHIFTS NEAR YOU</text>

    <!-- Shift card -->
    <rect x="20" y="148" width="220" height="160" rx="14" fill="#0c0c0e"/>
    <text x="36" y="174" font-family="ui-monospace, monospace" font-size="9" fill="#5b78ff" letter-spacing="1">PICKED FOR YOU</text>
    <text x="36" y="206" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#fff">Order picker</text>
    <text x="36" y="226" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#8a8a93">Bol.com · 1.2 km away</text>
    <rect x="36" y="244" width="60" height="22" rx="11" fill="#5b78ff"/>
    <text x="66" y="259" font-family="ui-monospace, monospace" font-size="10" fill="#0c0c0e" text-anchor="middle">€22/h</text>
    <text x="106" y="259" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#bbb">Tomorrow · 8h</text>

    <!-- Smaller card -->
    <rect x="20" y="324" width="220" height="78" rx="14" fill="#fff" stroke="#e8e8e2"/>
    <text x="36" y="350" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#0c0c0e">Cashier</text>
    <text x="36" y="368" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#8a8a93">Albert Heijn · 0.8 km</text>
    <text x="36" y="388" font-family="ui-monospace, monospace" font-size="10" fill="#5b78ff">€14.50/h</text>

    <!-- Tab bar -->
    <rect x="0" y="476" width="260" height="64" fill="#fafaf7"/>
    <circle cx="65" cy="508" r="4" fill="#5b78ff"/>
    <circle cx="130" cy="508" r="4" fill="#ddd"/>
    <circle cx="195" cy="508" r="4" fill="#ddd"/>
  </g>

  <!-- Phone 2 (centre, slightly back) — Shift detail -->
  <g transform="translate(540,160) rotate(2)">
    <rect width="320" height="640" rx="40" fill="#0c0c0e" stroke="#26262c" stroke-width="2"/>
    <rect x="12" y="12" width="296" height="616" rx="32" fill="#fafaf7"/>
    <rect x="120" y="16" width="80" height="22" rx="11" fill="#0c0c0e"/>

    <!-- Hero image area -->
    <rect x="12" y="12" width="296" height="240" rx="32" fill="url(#phoneGrad)"/>
    <text x="160" y="160" font-family="Georgia, serif" font-size="36" font-style="italic" font-weight="300" fill="#fff" text-anchor="middle">Pick a shift</text>
    <text x="160" y="190" font-family="Georgia, serif" font-size="36" font-style="italic" font-weight="300" fill="#fff" text-anchor="middle">that fits you.</text>

    <!-- Body card -->
    <text x="32" y="298" font-family="ui-monospace, monospace" font-size="10" fill="#5b78ff" letter-spacing="1">€22/h · 8 HOURS · 1.2 KM</text>
    <text x="32" y="334" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#0c0c0e">Order picker</text>
    <text x="32" y="354" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#8a8a93">Bol.com Waalwijk · Tomorrow, 8 AM</text>

    <!-- Lines that suggest body content -->
    <rect x="32" y="380" width="240" height="8" rx="4" fill="#e8e8e2"/>
    <rect x="32" y="396" width="220" height="8" rx="4" fill="#e8e8e2"/>
    <rect x="32" y="412" width="180" height="8" rx="4" fill="#e8e8e2"/>

    <!-- Tags -->
    <rect x="32" y="440" width="60" height="22" rx="11" fill="#fff" stroke="#5b78ff"/>
    <text x="62" y="455" font-family="ui-monospace, monospace" font-size="9" fill="#5b78ff" text-anchor="middle">FLEX</text>
    <rect x="100" y="440" width="80" height="22" rx="11" fill="#fff" stroke="#e8e8e2"/>
    <text x="140" y="455" font-family="ui-monospace, monospace" font-size="9" fill="#8a8a93" text-anchor="middle">WAREHOUSE</text>

    <!-- Big CTA -->
    <rect x="32" y="540" width="256" height="56" rx="28" fill="#5b78ff"/>
    <text x="160" y="572" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#0c0c0e" text-anchor="middle">Claim this shift</text>
  </g>

  <!-- Phone 3 (right) — Profile / community -->
  <g transform="translate(940,210) rotate(8)">
    <rect width="260" height="540" rx="34" fill="#0c0c0e" stroke="#26262c" stroke-width="2"/>
    <rect x="10" y="10" width="240" height="520" rx="26" fill="#fafaf7"/>
    <rect x="100" y="14" width="60" height="20" rx="10" fill="#0c0c0e"/>

    <!-- Avatar -->
    <circle cx="130" cy="98" r="38" fill="url(#phoneGrad)"/>
    <text x="130" y="106" font-family="Georgia, serif" font-style="italic" font-size="28" font-weight="400" fill="#fff" text-anchor="middle">T</text>

    <text x="130" y="156" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#0c0c0e" text-anchor="middle">Tim R.</text>
    <text x="130" y="174" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#8a8a93" text-anchor="middle">★ 4.91 · Local hero</text>

    <!-- Stats row -->
    <g transform="translate(20,200)" font-family="Helvetica, Arial, sans-serif">
      <rect width="65" height="68" rx="10" fill="#fff" stroke="#e8e8e2"/>
      <text x="32" y="36" font-size="20" font-weight="700" fill="#0c0c0e" text-anchor="middle">84</text>
      <text x="32" y="56" font-family="ui-monospace, monospace" font-size="8" fill="#8a8a93" text-anchor="middle">SHIFTS</text>

      <rect x="78" width="65" height="68" rx="10" fill="#fff" stroke="#e8e8e2"/>
      <text x="110" y="36" font-size="20" font-weight="700" fill="#5b78ff" text-anchor="middle">27</text>
      <text x="110" y="56" font-family="ui-monospace, monospace" font-size="8" fill="#8a8a93" text-anchor="middle">BADGES</text>

      <rect x="156" width="65" height="68" rx="10" fill="#fff" stroke="#e8e8e2"/>
      <text x="188" y="36" font-size="20" font-weight="700" fill="#0c0c0e" text-anchor="middle">2</text>
      <text x="188" y="56" font-family="ui-monospace, monospace" font-size="8" fill="#8a8a93" text-anchor="middle">CLUBS</text>
    </g>

    <!-- Badge card -->
    <rect x="20" y="296" width="220" height="120" rx="14" fill="#5b78ff"/>
    <text x="36" y="324" font-family="ui-monospace, monospace" font-size="9" fill="#0c0c0e" letter-spacing="1">BADGE UNLOCKED</text>
    <text x="36" y="358" font-family="Georgia, serif" font-size="20" font-style="italic" font-weight="300" fill="#0c0c0e">Local hero.</text>
    <text x="36" y="388" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#0c0c0e">5 shifts in your neighbourhood</text>

    <!-- Tab bar -->
    <rect x="0" y="476" width="260" height="64" fill="#fafaf7"/>
    <circle cx="65" cy="508" r="4" fill="#ddd"/>
    <circle cx="130" cy="508" r="4" fill="#ddd"/>
    <circle cx="195" cy="508" r="4" fill="#5b78ff"/>
  </g>

  <text x="120" y="970" font-family="ui-monospace, monospace" font-size="14" fill="#5b78ff" letter-spacing="2">AFTER — DMP CONSUMER APP · GREENFIELD · WORKER AS PROTAGONIST</text>
</svg>
